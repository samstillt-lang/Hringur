<!DOCTYPE html>
<html lang="is">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#7ecef5">
<title>Norðurslóðaævintýri Hrings</title>
<link href="https://fonts.googleapis.com/css2?family=Atkinson+Hyperlegible:ital,wght@0,400;0,700;1,400&family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">
<style>
/* ÉG HEF HALDIÐ ÖLLUM ÞÍNUM STÍLUM (STJÖRNUR, FJÖLL, AURORA) ÓBREYTTUM */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

:root {
  --ice-deep:    #0b2e4e;
  --surface:     #f0f8ff;
  --card:        #ffffff;
  --teal:        #1D9E75;
  --teal-light:  #e1f5ee;
  --teal-mid:    #5DCAA5;
  --amber:       #BA7517;
  --amber-light: #faeeda;
  --amber-mid:   #FAC775;
  --blue:        #185FA5;
  --blue-light:  #e6f1fb;
  --blue-mid:    #378ADD;
  --coral:       #993C1D;
  --coral-light: #faece7;
  --coral-mid:   #D85A30;
  --purple:      #534AB7;
  --purple-light:#eeedfe;
  --purple-mid:  #7F77DD;
  --text-main:   #0b2e4e;
  --text-sub:    #3a6a8a;
  --text-muted:  #7aabbf;
  --border:      rgba(11,46,78,0.08);
  --shadow-sm:   0 2px 8px rgba(11,46,78,0.08);
  --shadow-md:   0 6px 24px rgba(11,46,78,0.13);
  --shadow-lg:   0 12px 40px rgba(11,46,78,0.18);
  --inner-top:   inset 0 1px 0 rgba(255,255,255,0.85);
  --r-sm: 10px; --r-md: 16px; --r-lg: 24px;
}

html, body { height:100%; overflow:hidden; background:var(--surface); font-family:'Atkinson Hyperlegible', Arial, sans-serif; color:var(--text-main); letter-spacing:0.01em; }

/* ── SCREENS ── */
.screen { position:fixed; inset:0; display:flex; flex-direction:column; opacity:0; pointer-events:none; background:var(--surface); overflow:hidden; transition:opacity 0.28s ease-out, transform 0.28s ease-out; transform:translateY(0); }
.screen.active { opacity:1; pointer-events:all; transform:translateY(0) !important; }
#s-station { transform:translateY(40px); }
#s-home.returning { transform:translateY(-12px); }
.scroll-body { flex:1; overflow-y:auto; -webkit-overflow-scrolling:touch; }
.scroll-body::-webkit-scrollbar { display:none; }

/* ── HERO ── */
.hero {
  position:relative; height:240px; overflow:hidden; flex-shrink:0;
  background:#020608;
  mask-image:linear-gradient(180deg,black 68%,transparent 100%);
  -webkit-mask-image:linear-gradient(180deg,black 68%,transparent 100%);
}
.hero.short { height:210px; }
.hero.tall  { height:380px; }
.aurora-cvs { position:absolute; inset:0; width:100%; height:100%; z-index:0; display:block; }
.hero-img { position:absolute; inset:0; width:100%; height:100%; object-fit:cover; object-position:center top; z-index:1; opacity:0; transition:opacity 0.45s ease-out; }
.hero-img.loaded { opacity:1; }
@keyframes cheerBounce { 0%{transform:scale(1);} 40%{transform:scale(1.055);} 70%{transform:scale(0.98);} 100%{transform:scale(1);} }
.hero-img.cheer-bounce { animation:cheerBounce 0.45s cubic-bezier(0.34,1.3,0.64,1); }
.sf-layer { position:absolute; inset:0; pointer-events:none; z-index:3; }
.sf { position:absolute; color:rgba(255,255,255,0.75); animation:sfall linear infinite; user-select:none; pointer-events:none; }
@keyframes sfall { 0%{transform:translateY(-10px) rotate(0deg);opacity:0;} 8%{opacity:0.8;} 92%{opacity:0.5;} 100%{transform:translateY(360px) rotate(400deg);opacity:0;} }

/* ── CARDS ── */
.card { background:var(--card); border-radius:var(--r-lg); border:1.5px solid rgba(55,138,221,0.18); box-shadow:var(--inner-top), var(--shadow-md); padding:18px 20px; }
.section-label { font-size:11px; font-weight:800; letter-spacing:2px; text-transform:uppercase; color:var(--text-muted); margin-bottom:12px; }

/* ── PROGRESS ── */
.prog-row { display:flex; align-items:center; justify-content:space-between; margin-bottom:12px; }
.prog-count { font-family:'Nunito',Arial,sans-serif; font-size:24px; font-weight:900; color:var(--ice-deep); line-height:1; }
.prog-count small { font-size:14px; font-weight:700; color:var(--text-muted); }
.track { height:8px; background:var(--teal-light); border-radius:99px; overflow:hidden; margin-bottom:14px; }
.fill { height:100%; width:0; border-radius:99px; background:linear-gradient(90deg,var(--teal-mid),var(--blue-mid)); transition:width 0.6s ease-out; }
.dots { display:grid; grid-template-columns:repeat(6,1fr); gap:8px; }
.dot { aspect-ratio:1; border-radius:10px; border:1.5px solid var(--border); background:var(--surface); display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:800; color:var(--text-muted); transition:border-color 0.2s, background 0.2s; }
.dot.done { border-color:var(--teal-mid); background:linear-gradient(145deg,#d0f5e8,var(--teal-light)); color:var(--teal); animation:gemPop 0.35s cubic-bezier(0.34,1.56,0.64,1) both; box-shadow:var(--inner-top), 0 2px 8px rgba(29,158,117,0.2); }
@keyframes gemPop { 0%{transform:scale(0); opacity:0;} 60%{transform:scale(1.18);} 100%{transform:scale(1); opacity:1;} }

/* ── PILLS ── */
.pill-row { display:flex; gap:10px; }
.pill { flex:1; border-radius:var(--r-md); padding:14px 14px 12px; display:flex; flex-direction:column; gap:3px; }
.pill.amber  { background:var(--amber-light);  border:1.5px solid rgba(186,117,23,0.22); box-shadow:var(--inner-top); }
.pill.teal   { background:var(--teal-light);   border:1.5px solid rgba(29,158,117,0.22); box-shadow:var(--inner-top); }
.pill-icon { width:28px; height:28px; border-radius:8px; display:flex; align-items:center; justify-content:center; margin-bottom:4px; }
.pill.amber .pill-icon { background:rgba(186,117,23,0.15); }
.pill.teal  .pill-icon { background:rgba(29,158,117,0.15); }
.pill-icon svg { width:16px; height:16px; }
.pill.amber .pill-icon svg { fill:var(--amber); }
.pill.teal  .pill-icon svg { fill:var(--teal); }
.pill-lbl { font-size:10px; font-weight:800; letter-spacing:1.5px; text-transform:uppercase; }
.pill.amber .pill-lbl { color:var(--amber); }
.pill.teal  .pill-lbl { color:var(--teal); }
.pill-val { font-family:'Nunito',Arial,sans-serif; font-size:18px; font-weight:900; color:var(--ice-deep); line-height:1.1; }
.pill-sub { font-size:11px; font-weight:700; }
.pill.amber .pill-sub { color:var(--amber); }
.pill.teal  .pill-sub { color:var(--teal); }

/* ── HINT ── */
.hint { background:var(--blue-light); border-radius:var(--r-md); border:1px solid rgba(55,138,221,0.15); padding:14px 16px; display:flex; align-items:flex-start; gap:12px; }
.hint-icon { width:32px; height:32px; flex-shrink:0; background:var(--blue-mid); border-radius:10px; display:flex; align-items:center; justify-content:center; }
.hint-icon svg { width:16px; height:16px; fill:#fff; }
.hint-text { font-size:13px; font-weight:700; color:var(--blue); line-height:1.55; padding-top:2px; }

/* ── STORAGE WARNING ── */
.storage-warn { background:#fff8e6; border:1px solid rgba(186,117,23,0.25); border-radius:var(--r-md); padding:12px 16px; display:flex; align-items:flex-start; gap:10px; margin-top:14px; }
.storage-warn svg { width:18px; height:18px; fill:var(--amber); flex-shrink:0; margin-top:1px; }
.storage-warn p { font-size:12px; font-weight:700; color:var(--amber); line-height:1.5; }

/* ── BUTTONS ── */
.btn-primary { display:block; width:100%; background:linear-gradient(180deg,#1a3f62 0%,var(--ice-deep) 100%); color:#fff; border:none; border-
